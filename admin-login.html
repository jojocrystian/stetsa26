<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Stetsa'26</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
  <div class="bg-overlay"></div>
  <div class="bg-image" style="background-image:url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1920')"></div>
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-ring"></div>
    <p>Loading...</p>
  </div>

  <div class="login-container">
    <div class="login-card glass">
      <div class="login-logo" style="color:#f59e0b">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1 class="login-title">Admin Panel</h1>
      <h2 class="login-subtitle">Stetsa'26 — Committee Only</h2>
      <form onsubmit="adminLogin(event)">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Username" required autocomplete="off">
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-pw" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </span>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn-login" id="loginBtn" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">
          <span id="loginBtnText">Masuk</span>
          <div class="btn-loader" id="btnLoader"></div>
        </button>
        <a href="#" onclick="window.open('https://wa.me/6281311719622','_blank')" class="contact-admin">
          <i class="fab fa-whatsapp"></i> Hubungi Admin
        </a>
        <div style="margin-top:20px;text-align:center">
          <a href="index.html" style="font-size:13px;color:rgba(255,255,255,.4);text-decoration:none">
            <i class="fas fa-arrow-left"></i> Kembali ke Login Siswa
          </a>
        </div>
      </form>
    </div>
  </div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbw1BZPAvPKLHYHWvWYNZQHs3K97Y5DEK7RBgqzHF8nDCo4syfk6Vd_c9Rt9h4IK3G_B/exec";
var SESSION_DURATION = 28800000;

function showToast(msg, type) {
  if (!type) { type = "info"; }
  var c = document.getElementById("toastContainer");
  if (!c) {
    c = document.createElement("div");
    c.id = "toastContainer";
    c.className = "toast-container";
    document.body.appendChild(c);
  }
  var icons  = { success: "fa-check-circle", error: "fa-times-circle", info: "fa-info-circle" };
  var colors = { success: "#10B981", error: "#EF4444", info: "#6C63FF" };
  var t = document.createElement("div");
  t.className = "toast " + type;
  t.innerHTML = "<i class='fas " + icons[type] + "' style='color:" + colors[type] + ";flex-shrink:0'></i> " + msg;
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = "0"; }, 3200);
  setTimeout(function() { t.remove(); }, 3700);
}

function apiCall(action, data) {
  if (!data) { data = {}; }
  var p = new URLSearchParams();
  p.append("action", action);
  var keys = Object.keys(data);
  for (var i = 0; i < keys.length; i++) {
    p.append(keys[i], data[keys[i]]);
  }
  return fetch(API_URL + "?" + p.toString(), { method: "GET" })
    .then(function(r) {
      if (!r.ok) { throw new Error("HTTP " + r.status); }
      return r.json();
    })
    .catch(function(e) {
      console.error(e);
      return { success: false, message: "Koneksi gagal." };
    });
}

function getSession(key) {
  if (!key) { key = "stetsa_admin_session"; }
  try {
    var s = localStorage.getItem(key);
    if (!s) { return null; }
    var parsed = JSON.parse(s);
    if (Date.now() > parsed.expires) {
      localStorage.removeItem(key);
      return null;
    }
    return parsed;
  } catch(e) {
    return null;
  }
}

function setSession(data, key) {
  if (!key) { key = "stetsa_admin_session"; }
  var session = {};
  var keys = Object.keys(data);
  for (var i = 0; i < keys.length; i++) {
    session[keys[i]] = data[keys[i]];
  }
  session.expires = Date.now() + SESSION_DURATION;
  localStorage.setItem(key, JSON.stringify(session));
}

function togglePassword() {
  var inp = document.getElementById("password");
  var ic  = document.getElementById("eyeIcon");
  if (!inp) { return; }
  if (inp.type === "password") {
    inp.type = "text";
    ic.className = "fas fa-eye-slash";
  } else {
    inp.type = "password";
    ic.className = "fas fa-eye";
  }
}

function adminLogin(e) {
  e.preventDefault();
  var username = document.getElementById("username").value.trim();
  var password = document.getElementById("password").value.trim();
  var errEl    = document.getElementById("errorMsg");
  var btn      = document.getElementById("loginBtn");
  var txt      = document.getElementById("loginBtnText");
  var ldr      = document.getElementById("btnLoader");

  txt.style.display = "none";
  ldr.style.display = "block";
  btn.disabled      = true;
  errEl.textContent = "";

  apiCall("adminLogin", { username: username, password: password })
    .then(function(result) {
      txt.style.display = "block";
      ldr.style.display = "none";
      btn.disabled      = false;
      if (result.success) {
        setSession(result.data, "stetsa_admin_session");
        showToast("Login berhasil!", "success");
        setTimeout(function() { window.location.href = "admin.html"; }, 800);
      } else {
        errEl.textContent = result.message || "Username atau password salah.";
        var card = document.querySelector(".login-card");
        if (card) {
          card.style.animation = "shake .4s";
          setTimeout(function() { card.style.animation = ""; }, 500);
        }
      }
    })
    .catch(function(err) {
      txt.style.display = "block";
      ldr.style.display = "none";
      btn.disabled      = false;
      errEl.textContent = "Terjadi kesalahan koneksi.";
      console.error(err);
    });
}

// ===== INIT =====
window.addEventListener("DOMContentLoaded", function() {
  var session = getSession("stetsa_admin_session");
  if (session) {
    window.location.href = "admin.html";
  }
  setTimeout(function() {
    var ls = document.getElementById("loadingScreen");
    if (ls) { ls.classList.add("hidden"); }
  }, 900);
});
</script>
</body>
</html>
