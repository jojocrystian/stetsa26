<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - Stetsa'26</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="home-body">
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-ring"></div>
    <p>Loading...</p>
  </div>

  <div class="slideshow-bg" id="slideshowBg"></div>
  <div class="home-overlay"></div>

  <nav class="navbar">
    <div class="navbar-brand">
      <i class="fas fa-images"></i> Stetsa'26
    </div>
    <div class="nav-actions" style="position:relative">
      <div class="avatar-btn" id="avatarBtn" onclick="toggleDropdown()">
        <i class="fas fa-user"></i>
      </div>
      <div class="dropdown-menu" id="dropdownMenu">
        <div class="dropdown-item" onclick="showStudentData()">
          <i class="fas fa-id-card"></i> Data Saya
        </div>
        <div class="dropdown-item" onclick="openModal('editProfileModal')">
          <i class="fas fa-camera"></i> Edit Profil
        </div>
        <hr class="dropdown-divider">
        <div class="dropdown-item" onclick="logout()" style="color:#ef4444">
          <i class="fas fa-sign-out-alt" style="color:#ef4444"></i> Logout
        </div>
      </div>
    </div>
  </nav>

  <div class="home-content">
    <div class="countdown-widget" id="countdownWidget" style="display:none">
      <div class="countdown-title" id="countdownTitle">Prom Night Countdown</div>
      <div class="countdown-row">
        <div class="cd-unit"><span class="cd-num" id="cdDays">00</span><div class="cd-label">Hari</div></div>
        <div class="cd-unit"><span class="cd-num" id="cdHours">00</span><div class="cd-label">Jam</div></div>
        <div class="cd-unit"><span class="cd-num" id="cdMins">00</span><div class="cd-label">Menit</div></div>
        <div class="cd-unit"><span class="cd-num" id="cdSecs">00</span><div class="cd-label">Detik</div></div>
      </div>
    </div>

    <div class="hero-section">
      <p class="greeting">Selamat datang,</p>
      <h1 class="hero-name" id="heroName">...</h1>
      <p class="hero-class" id="heroClass"></p>
      <p class="hero-event">✨ Stetsa'26</p>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="totalPhotos">0</div>
          <div class="stat-label"><i class="fas fa-images"></i> Total Foto</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="viewCounter">0</div>
          <div class="stat-label"><i class="fas fa-eye"></i> Pengunjung</div>
        </div>
      </div>
      <a href="gallery.html" class="btn-gallery">
        <i class="fas fa-images"></i> Lihat & Download Foto
      </a>
    </div>

    <div class="section-row">
      <div class="feature-card">
        <h3><i class="fas fa-star"></i> Rating Website</h3>
        <p style="font-size:13px;color:rgba(255,255,255,.55);margin-bottom:12px">Bagaimana pendapatmu?</p>
        <div class="star-rating" id="starRating">
          <span onclick="setRating(1)">&#9733;</span>
          <span onclick="setRating(2)">&#9733;</span>
          <span onclick="setRating(3)">&#9733;</span>
          <span onclick="setRating(4)">&#9733;</span>
          <span onclick="setRating(5)">&#9733;</span>
        </div>
        <p id="ratingMsg" style="font-size:13px;margin-top:10px;color:rgba(255,255,255,.5);min-height:20px"></p>
      </div>

      <div class="feature-card" style="flex:2;min-width:280px">
        <h3><i class="fas fa-comment-heart"></i> Pesan & Kesan</h3>
        <div class="impression-form">
          <textarea id="impressionText" rows="3" placeholder="Tulis pesan atau kesan kamu untuk Stetsa'26..."></textarea>
          <button class="btn-send" onclick="sendImpression()">
            <i class="fas fa-paper-plane"></i> Kirim
          </button>
        </div>
        <div class="impressions-list" id="impressionsList"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editProfileModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Edit Profil</h3>
        <span class="modal-close" onclick="closeModal('editProfileModal')">&times;</span>
      </div>
      <div style="text-align:center;margin-bottom:20px">
        <div id="profilePhotoCircle" style="width:90px;height:90px;border-radius:50%;background:rgba(108,99,255,.2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;border:2px solid var(--primary)">
          <i class="fas fa-user"></i>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Upload Foto Profil</label>
        <div class="upload-zone" onclick="document.getElementById('profileInput').click()">
          <i class="fas fa-camera"></i>
          <p>Klik untuk pilih foto</p>
          <input type="file" id="profileInput" accept="image/*" style="display:none" onchange="previewProfile(event)">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('editProfileModal')">Batal</button>
        <button class="btn btn-primary" onclick="saveProfilePhoto()">
          <i class="fas fa-save"></i> Simpan
        </button>
      </div>
    </div>
  </div>

  <a href="#" onclick="window.open('https://wa.me/6281311719622','_blank')" class="wa-float">
    <i class="fab fa-whatsapp"></i>
  </a>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbw1BZPAvPKLHYHWvWYNZQHs3K97Y5DEK7RBgqzHF8nDCo4syfk6Vd_c9Rt9h4IK3G_B/exec";
var SESSION_DURATION = 28800000;

function showToast(msg, type) {
  if (!type) { type = "info"; }
  var c = document.getElementById("toastContainer");
  if (!c) {
    c = document.createElement("div");
    c.id = "toastContainer";
    c.className = "toast-container";
    document.body.appendChild(c);
  }
  var icons  = { success: "fa-check-circle", error: "fa-times-circle", info: "fa-info-circle" };
  var colors = { success: "#10B981", error: "#EF4444", info: "#6C63FF" };
  var t = document.createElement("div");
  t.className = "toast " + type;
  t.innerHTML = "<i class='fas " + icons[type] + "' style='color:" + colors[type] + ";flex-shrink:0'></i> " + msg;
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = "0"; }, 3200);
  setTimeout(function() { t.remove(); }, 3700);
}

function apiCall(action, data) {
  if (!data) { data = {}; }
  var p = new URLSearchParams();
  p.append("action", action);
  var keys = Object.keys(data);
  for (var i = 0; i < keys.length; i++) {
    p.append(keys[i], data[keys[i]]);
  }
  return fetch(API_URL + "?" + p.toString(), { method: "GET" })
    .then(function(r) {
      if (!r.ok) { throw new Error("HTTP " + r.status); }
      return r.json();
    })
    .catch(function(e) {
      console.error(e);
      return { success: false, message: "Koneksi gagal." };
    });
}

function apiPost(action, data) {
  if (!data) { data = {}; }
  var body = { action: action };
  var keys = Object.keys(data);
  for (var i = 0; i < keys.length; i++) {
    body[keys[i]] = data[keys[i]];
  }
  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  })
    .then(function(r) {
      if (!r.ok) { throw new Error("HTTP " + r.status); }
      return r.json();
    })
    .catch(function(e) {
      console.error(e);
      return { success: false, message: "Koneksi gagal." };
    });
}

function getSession(key) {
  if (!key) { key = "stetsa_session"; }
  try {
    var s = localStorage.getItem(key);
    if (!s) { return null; }
    var parsed = JSON.parse(s);
    if (Date.now() > parsed.expires) {
      localStorage.removeItem(key);
      return null;
    }
    return parsed;
  } catch(e) {
    return null;
  }
}

function setSession(data, key) {
  if (!key) { key = "stetsa_session"; }
  var session = {};
  var keys = Object.keys(data);
  for (var i = 0; i < keys.length; i++) {
    session[keys[i]] = data[keys[i]];
  }
  session.expires = Date.now() + SESSION_DURATION;
  localStorage.setItem(key, JSON.stringify(session));
}

function clearSession(key) {
  if (!key) { key = "stetsa_session"; }
  localStorage.removeItem(key);
}

function openModal(id) {
  var m = document.getElementById(id);
  if (m) { m.classList.add("open"); }
}

function closeModal(id) {
  var m = document.getElementById(id);
  if (m) { m.classList.remove("open"); }
}

function toggleDropdown() {
  var m = document.getElementById("dropdownMenu");
  if (m) { m.classList.toggle("show"); }
}

function logout() {
  clearSession("stetsa_session");
  showToast("Berhasil logout.", "info");
  setTimeout(function() { window.location.href = "index.html"; }, 700);
}

var currentRating = 0;
function setRating(val) {
  currentRating = val;
  var stars = document.querySelectorAll("#starRating span");
  for (var i = 0; i < stars.length; i++) {
    stars[i].className = i < val ? "active" : "";
  }
  var labels = ["", "Kurang", "Cukup", "Bagus", "Keren", "Luar Biasa"];
  var msg = document.getElementById("ratingMsg");
  if (msg) { msg.textContent = labels[val]; }
  apiPost("submitRating", { rating: val });
}

function sendImpression() {
  var text = document.getElementById("impressionText").value.trim();
  if (!text) { showToast("Pesan tidak boleh kosong!", "error"); return; }
  var session = getSession("stetsa_session");
  if (!session) { return; }
  apiPost("addImpression", { userId: session.id, name: session.name || session.username, text: text }).then(function(res) {
    if (res.success) {
      showToast("Pesan terkirim!", "success");
      document.getElementById("impressionText").value = "";
      loadImpressions([res.impression].concat(window._impressions || []).slice(0, 30));
    } else {
      showToast(res.message || "Gagal mengirim.", "error");
    }
  });
}

function previewProfile(e) {
  var file = e.target.files[0];
  if (!file) { return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    var circle = document.getElementById("profilePhotoCircle");
    if (circle) {
      circle.innerHTML = "<img src='" + ev.target.result + "' style='width:100%;height:100%;object-fit:cover'>";
    }
  };
  reader.readAsDataURL(file);
}

function saveProfilePhoto() {
  var input = document.getElementById("profileInput");
  if (!input.files[0]) { showToast("Pilih foto!", "error"); return; }
  var session = getSession("stetsa_session");
  if (!session) { return; }
  showToast("Mengupload...", "info");
  var reader = new FileReader();
  reader.onload = function(ev) {
    apiPost("uploadProfilePhoto", { userId: session.id, photoBase64: ev.target.result }).then(function(res) {
      if (res.success) {
        session.photoUrl = res.url;
        setSession(session, "stetsa_session");
        var btn = document.getElementById("avatarBtn");
        if (btn) { btn.innerHTML = "<img src='" + res.url + "' alt='avatar'>"; }
        showToast("Foto profil diperbarui!", "success");
        closeModal("editProfileModal");
      } else {
        showToast(res.message || "Upload gagal.", "error");
      }
    });
  };
  reader.readAsDataURL(input.files[0]);
}

function showStudentData() {
  var s = getSession("stetsa_session");
  if (!s) { return; }
  showToast(s.name + " | NIS: " + s.nis + " | " + s.className, "info");
  document.getElementById("dropdownMenu").classList.remove("show");
}

// ===== INIT =====
window.addEventListener("DOMContentLoaded", function() {
  var session = getSession("stetsa_session");
  if (!session) {
    window.location.href = "index.html";
    return;
  }
  document.getElementById("heroName").textContent = session.name || session.username;
  document.getElementById("heroClass").textContent = session.className || "";
  if (session.photoUrl) {
    var btn = document.getElementById("avatarBtn");
    if (btn) { btn.innerHTML = "<img src='" + session.photoUrl + "' alt='avatar'>"; }
  }
  initHome(session);
});

function initHome(session) {
  apiCall("getHomeData", { userId: session.id, classId: session.classId }).then(function(res) {
    if (res.success) {
      
      
      buildSlideshow(res.slideshowPhotos || []);
      if (res.countdownActive && res.countdownDate) {
        showCountdown(res.countdownDate, res.countdownTitle);
      }
      loadImpressions(res.impressions || []);
    }
  });
  apiPost("incrementView", {});
}

function buildSlideshow(photos) {
  var bg = document.getElementById("slideshowBg");
  if (!bg) { return; }
  var urls = photos.length ? photos.map(function(p) { return p.url; }) : [
    "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1920",
    "https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=1920",
    "https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1920"
  ];
  for (var i = 0; i < urls.length; i++) {
    var div = document.createElement("div");
    div.className = "slide" + (i === 0 ? " active" : "");
    div.style.backgroundImage = "url('" + urls[i] + "')";
    bg.appendChild(div);
  }
  var cur = 0;
  setInterval(function() {
    var slides = bg.querySelectorAll(".slide");
    slides[cur].classList.remove("active");
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add("active");
  }, 5000);
}

function showCountdown(dateStr, title) {
  var widget = document.getElementById("countdownWidget");
  if (!widget) { return; }
  widget.style.display = "block";
  var target = new Date(dateStr).getTime();
  if (title) { document.getElementById("countdownTitle").textContent = title; }
  function tick() {
    var diff = target - Date.now();
    if (diff <= 0) { widget.style.display = "none"; return; }
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    document.getElementById("cdDays").textContent = String(d).padStart(2, "0");
    document.getElementById("cdHours").textContent = String(h).padStart(2, "0");
    document.getElementById("cdMins").textContent = String(m).padStart(2, "0");
    document.getElementById("cdSecs").textContent = String(s).padStart(2, "0");
  }
  tick();
  setInterval(tick, 1000);
}

function loadImpressions(list) {
  window._impressions = list;
  var el = document.getElementById("impressionsList");
  if (!el) { return; }
  if (!list.length) {
    el.innerHTML = '<p style="font-size:13px;color:rgba(255,255,255,.35);text-align:center;padding:12px">Belum ada pesan.</p>';
    return;
  }
  el.innerHTML = list.map(function(imp) {
    var pin = imp.pinned ? '<div class="imp-pin"><i class="fas fa-thumbtack"></i> Disematkan</div>' : "";
    return "<div class='impression-item'>" + pin + "<div class='imp-name'>" + imp.name + "</div><div class='imp-text'>" + imp.text + "</div></div>";
  }).join("");
}

document.addEventListener("click", function(e) {
  if (e.target.classList.contains("modal-overlay")) {
    e.target.classList.remove("open");
  }
});
</script>
</body>
</html>
